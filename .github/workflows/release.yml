name: Release & Distribute

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'  # Triggers on tags like 1.0.0

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Aporia ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    name: Update Local Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Formula
        run: |
          NEW_URL="https://github.com/fr3on/aporia/archive/refs/tags/${{ github.ref_name }}.tar.gz"
          # Download and get SHA
          curl -L "$NEW_URL" -o aporia.tar.gz
          NEW_SHA=$(shasum -a 256 aporia.tar.gz | awk '{print $1}')
          
          # Update the Ruby file with more precise patterns
          sed -i "s|^\s*url \".*\"|  url \"$NEW_URL\"|g" Formula/aporia.rb
          sed -i "s|^\s*sha256 \".*\"|  sha256 \"$NEW_SHA\"|g" Formula/aporia.rb
          
          rm aporia.tar.gz
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/aporia.rb
          git commit -m "chore: update brew formula to ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin main
