name: Release & Distribute

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'  # Triggers on tags like 1.0.0

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Aporia ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    name: Sync Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Bump Homebrew formula
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          tap: fr3on/homebrew-aporia
          formula-name: aporia
          # We use a custom PAT to allow pushing to the tap repo
          # and triggering follow-up workflows if needed.
          commit-message: "chore: update Aporia to ${{ github.ref_name }}"
        env:
          COMMITTER_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
