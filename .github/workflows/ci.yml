name: CI
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install zsh + shellcheck
        run: sudo apt-get install -y zsh shellcheck
      - name: zsh syntax check
        run: |
          zsh -n aporia.zsh-theme
          zsh -n install.sh
          zsh -n uninstall.sh
      - name: run tests
        run: |
          zsh tests/test_segments.zsh
          zsh tests/test_compat.zsh
          zsh tests/test_languages.zsh
          zsh tests/test_utils.zsh
          zsh tests/test_branding.zsh
          zsh tests/test_bundled_plugins.zsh
          zsh tests/test_docker.zsh
          zsh tests/test_plugins.zsh
          zsh tests/test_prompt_logic.zsh
          zsh tests/test_theme.zsh
  lint-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: zsh syntax check
        run: |
          zsh -n aporia.zsh-theme
          zsh -n install.sh
          zsh -n uninstall.sh
      - name: run tests
        run: |
          zsh tests/test_segments.zsh
          zsh tests/test_compat.zsh
          zsh tests/test_languages.zsh
          zsh tests/test_utils.zsh
          zsh tests/test_branding.zsh
          zsh tests/test_bundled_plugins.zsh
          zsh tests/test_docker.zsh
          zsh tests/test_plugins.zsh
          zsh tests/test_prompt_logic.zsh
          zsh tests/test_theme.zsh
